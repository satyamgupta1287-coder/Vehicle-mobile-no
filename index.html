<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Info</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
    padding: 20px;
}

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    text-transform: uppercase;
}

button {
    margin-top: 10px;
    padding: 12px 20px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    text-align: left;
    background: #334155;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🚗 Vehicle Details</h2>

    <input id="number" placeholder="Enter Vehicle Number">
    <br>
    <button onclick="getData()">Search</button>

    <div id="result" class="result">Enter number...</div>
</div>

<script>
function getData() {
    let number = document.getElementById("number").value.trim().toUpperCase();

    if (!number) {
        alert("Enter vehicle number");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Loading...";

    fetch(`/api/getdata?number=${number}`)
    .then(res => res.json())
    .then(data => {

        console.log(data);

        let v = data?.result?.vehicle_info?.data;

        if (!v) {
            document.getElementById("result").innerHTML = "❌ No data found";
            return;
        }

        document.getElementById("result").innerHTML = `
            <p><b>🚘 Number:</b> ${v.reg_no || "N/A"}</p>
            <p><b>👤 Owner:</b> ${v.owner_name || "N/A"}</p>
            <p><b>⛽ Fuel:</b> ${v.fuel_type || "N/A"}</p>
            <p><b>🏢 Insurance:</b> ${v.insurance_company || "N/A"}</p>
            <p><b>📅 Insurance Till:</b> ${v.insurance_upto || "N/A"}</p>
            <p><b>🏛️ RTO:</b> ${v.reg_authority || "N/A"}</p>
            <p><b>🚦 Class:</b> ${v.vh_class || "N/A"}</p>
            <p><b>📱 Mobile:</b> ${v.mobile_number || "Not Available"}</p>
            <p><b>📆 Registration:</b> ${v.reg_date || "N/A"}</p>
        `;
    })
    .catch(err => {
        console.error(err);
        document.getElementById("result").innerHTML = "❌ Error fetching data";
    });
}

// Enter key support
document.getElementById("number").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        getData();
    }
});
</script>

</body>
</html>
